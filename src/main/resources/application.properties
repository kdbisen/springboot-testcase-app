# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Gemini CLI
# Default timeout (seconds)
gemini.cli.timeout=300
# Approval mode for MCP tools (yolo = auto-approve)
gemini.approval.mode=yolo
# Use JSON output for token stats
gemini.json.output=true

# Story cache (set to true for offline caching of story details)
story.cache.enabled=false
