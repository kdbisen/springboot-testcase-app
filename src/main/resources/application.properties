# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Gemini CLI
# Default timeout (seconds) — used when a per-operation timeout below is 0 or unset
gemini.cli.timeout=300
# Optional per-operation timeouts (seconds). Use 0 to fall back to gemini.cli.timeout
# gemini.cli.timeout.search=120
# gemini.cli.timeout.fetch=120
# gemini.cli.timeout.generate=300
# gemini.cli.timeout.subtask=180
# Retries for transient CLI failures (non-zero exit, timeouts, rate limits — not MCP denials)
gemini.cli.retry.max-attempts=2
gemini.cli.retry.delay-ms=1500
# Truncate Gemini stdout at INFO level (full output at DEBUG)
gemini.cli.log.max-info-chars=8000
# Use JSON output for token stats
gemini.json.output=true
# Extra env vars for Gemini subprocess (format: KEY1=value1;KEY2=value2). Set before running the command.
# Example: gemini.env.extra=GEMINI_USE_GIT_BASH=true
# gemini.env.extra=

# Jira prompt templates: load from external JSON file (default: classpath:jira-prompts.json)
# Optional A/B: file:./config/jira-prompts.json
# gemini.jira.prompts.path=classpath:jira-prompts.json

# Story cache: avoids re-running Gemini MCP fetch for the same issue key (large latency win). Cache dir: .story_cache/
# Recommended true when iterating on test generation for the same Jira ID.
story.cache.enabled=false

# When fetching multiple comma-separated Jira keys, run up to this many fetches in parallel (MCP/REST). Set 1 for strictly sequential.
story.fetch.parallelism=3

# Step 2 story digest: show/hide sections (and matching fields in the test-generation prompt).
# Defaults: only title, description, acceptance criteria (extras off). Set true to show story type, key points, attachments, etc.
# story.digest.ui.show-digest-intro=false
# story.digest.ui.show-story-type=false
# story.digest.ui.show-key-points-for-testing=false
# story.digest.ui.show-acceptance-criteria=true
# story.digest.ui.show-edge-cases-and-risks=false
# story.digest.ui.show-examples-or-scenarios=false
# story.digest.ui.show-attachments=false

# Jira REST API (Jira Cloud: email + API token). When set, story fetch and search use the API; Gemini is used only for test generation and optional Jira sub-task creation.
# Create token: https://id.atlassian.com/manage-profile/security/api-tokens
# jira.base-url=https://your-domain.atlassian.net
# jira.email=you@company.com
# jira.api-token=
# jira.connect-timeout-seconds=10
# jira.read-timeout-seconds=60
# jira.max-search-results=25
# jira.retry-max-attempts=2
# jira.retry-delay-ms=800
